<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>하루의 시작</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="하루의 시작">
<meta name="theme-color" content="#F5F1EA">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%23F5F1EA'/%3E%3Ctext x='256' y='345' font-family='serif' font-size='290' font-weight='900' fill='%231C1917' text-anchor='middle'%3E始%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%23F5F1EA'/%3E%3Ctext x='256' y='345' font-family='serif' font-size='290' font-weight='900' fill='%231C1917' text-anchor='middle'%3E始%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@200;300;400;600&family=Noto+Sans+KR:wght@100;300;400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ivory:#F5F1EA;--ivory2:#EDE9E0;--ink:#1C1917;--ink2:#3D3831;
  --dust:#9C9189;--dust2:#C4B8AD;--ember:#B5704A;--ember2:#D4956E;
  --line:rgba(28,25,23,.1);--line2:rgba(28,25,23,.06);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
html{background:#F5F1EA}
body{
  background:var(--ivory);min-height:100vh;min-height:100dvh;
  padding-top:var(--sat);padding-bottom:var(--sab);
  padding-left:var(--sal);padding-right:var(--sar);
  -webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;
}
::-webkit-scrollbar{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.65}50%{transform:scale(1.05);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes lineGrow{from{width:0}to{width:100%}}
@keyframes cardIn{from{opacity:0;transform:translateY(22px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.026;
}
/* SPLASH */
#splash{
  position:fixed;inset:0;padding-top:var(--sat);padding-bottom:var(--sab);
  background:var(--ivory);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;transition:opacity 1.2s ease;
}
#splash.out{opacity:0;pointer-events:none}
.splash-kanji{
  font-family:'Nanum Myeongjo',serif;font-size:clamp(6rem,22vw,11rem);
  font-weight:800;color:var(--ink);line-height:1;letter-spacing:-4px;
  animation:breathe 3s ease-in-out infinite;
}
.splash-sub{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:clamp(.8rem,2.5vw,1rem);color:var(--dust);
  letter-spacing:.35em;margin-top:1.2rem;text-transform:uppercase;
}
.splash-vline{width:1px;height:50px;background:var(--dust2);margin:2rem auto 1.6rem}
.key-area{display:flex;flex-direction:column;align-items:center;gap:.7rem;width:min(280px,80vw);margin-bottom:1.4rem}
.key-input{
  width:100%;background:transparent;border:none;border-bottom:1px solid var(--dust2);
  padding:.55rem .2rem;font-family:'Noto Sans KR',sans-serif;font-weight:100;
  font-size:.82rem;letter-spacing:.06em;color:var(--ink);
  outline:none;text-align:center;transition:border-color .3s;-webkit-appearance:none;
}
.key-input::placeholder{color:var(--dust2)}
.key-input:focus{border-color:var(--ember)}
.key-hint{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.56rem;letter-spacing:.18em;color:var(--dust2);text-align:center;line-height:1.7}
.key-saved-msg{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.65rem;letter-spacing:.22em;color:var(--ember);text-align:center;margin-bottom:1.4rem}
.splash-btn{
  font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.72rem;
  letter-spacing:.5em;color:var(--dust);text-transform:uppercase;
  background:none;border:none;cursor:pointer;padding:.6rem 1.4rem;
  border-bottom:1px solid var(--dust2);transition:all .4s;
  animation:pulse 2.5s ease-in-out infinite;-webkit-appearance:none;
}
.splash-btn:active{color:var(--ember);border-color:var(--ember)}
.key-error{margin-top:.8rem;font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.65rem;letter-spacing:.15em;color:var(--ember);display:none}
/* 설정 버튼 */
#settings-btn{
  position:fixed;top:calc(var(--sat) + .8rem);right:1.2rem;
  background:none;border:none;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-weight:100;
  font-size:.58rem;letter-spacing:.2em;color:var(--dust2);
  z-index:50;padding:.4rem .6rem;display:none;
}
#settings-btn:active{color:var(--ember)}
/* MAIN */
#app{
  max-width:520px;margin:0 auto;
  padding:0 1.6rem calc(3rem + var(--sab));
  position:relative;z-index:1;
  opacity:0;transition:opacity 1s ease .3s;
}
#app.visible{opacity:1}
/* CLOCK */
.header{padding:calc(2.6rem + var(--sat)) 0 1.8rem;animation:fadeIn 1s ease .2s both}
.header-label{
  font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.62rem;
  letter-spacing:.5em;color:var(--dust);text-transform:uppercase;
  display:flex;align-items:center;gap:.8rem;
}
.header-label::after{content:'';flex:1;height:1px;background:var(--line)}
.time-block{margin-top:1rem;display:flex;align-items:baseline;gap:.2rem}
.time-hm{font-family:'Nanum Myeongjo',serif;font-size:clamp(3.8rem,16vw,6.5rem);font-weight:700;color:var(--ink);letter-spacing:-3px;line-height:1}
.time-s{font-family:'Nanum Myeongjo',serif;font-size:clamp(1.6rem,6vw,2.8rem);font-weight:400;color:var(--dust2);letter-spacing:-1px;line-height:1;align-self:flex-end;margin-bottom:.3rem}
.date-row{margin-top:.6rem;display:flex;align-items:center;justify-content:space-between}
.date-ko{font-family:'Noto Serif KR',serif;font-weight:200;font-size:.88rem;color:var(--ink2);letter-spacing:.06em}
.greeting-tag{font-family:'IM Fell English',serif;font-style:italic;font-size:.75rem;color:var(--ember)}
/* DIVIDER */
.divider{height:1px;background:var(--line);margin:1.8rem 0;position:relative;overflow:hidden}
.divider::after{content:'';position:absolute;top:0;left:0;height:1px;background:linear-gradient(90deg,transparent,var(--ember),transparent);animation:lineGrow 1.5s ease both}
/* WEATHER */
.weather-wrap{animation:fadeIn 1s ease .4s both}
.weather-main{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:.2rem 0;user-select:none}
.weather-left{display:flex;align-items:baseline;gap:.6rem}
.weather-icon{font-size:1.5rem;line-height:1}
.weather-temp{font-family:'Nanum Myeongjo',serif;font-size:2.6rem;font-weight:700;color:var(--ink);letter-spacing:-2px;line-height:1}
.weather-label{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.7rem;letter-spacing:.1em;color:var(--dust);margin-top:.2rem}
.weather-right{text-align:right}
.weather-stat{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.65rem;color:var(--dust);letter-spacing:.08em;line-height:1.9}
.weather-toggle{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.58rem;letter-spacing:.2em;color:var(--ember);margin-top:.3rem}
.hourly-strip{display:flex;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-top:1.2rem;-webkit-overflow-scrolling:touch}
.hour-cell{flex:0 0 auto;width:62px;padding:.85rem .3rem;text-align:center;border-right:1px solid var(--line)}
.hour-cell:last-child{border-right:none}
.hour-time{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.56rem;letter-spacing:.08em;color:var(--dust)}
.hour-wx{font-size:1.05rem;margin:.35rem 0}
.hour-temp{font-family:'Nanum Myeongjo',serif;font-size:.92rem;font-weight:700;color:var(--ink2)}
/* SECTION */
.section{margin-bottom:2.6rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
.section-label{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.6rem;letter-spacing:.5em;color:var(--dust);text-transform:uppercase}
.refresh-btn{
  font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.6rem;
  letter-spacing:.2em;color:var(--dust2);background:none;border:none;
  border-bottom:1px solid transparent;cursor:pointer;padding:.4rem .6rem;
  text-transform:uppercase;transition:all .3s;-webkit-appearance:none;
}
.refresh-btn:active{color:var(--ember);border-color:var(--ember)}
.refresh-btn:disabled{opacity:.35;cursor:default}
/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:2.5rem 0}
.loader-ring{width:26px;height:26px;border:1px solid var(--dust2);border-top-color:var(--ember);border-radius:50%;animation:spin 1.2s linear infinite}
.loader-text{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.6rem;letter-spacing:.4em;color:var(--dust)}
/* QUOTE CARD */
.quote-card{background:var(--ink);border-radius:6px;padding:2.6rem 2.2rem 2.2rem;position:relative;overflow:hidden;animation:cardIn .7s ease both}
.quote-card::before{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(181,112,74,.18) 0%,transparent 70%);pointer-events:none}
.quote-card::after{content:'"';position:absolute;right:1.6rem;bottom:-1.4rem;font-family:'IM Fell English',serif;font-size:9rem;line-height:1;color:rgba(255,255,255,.04);pointer-events:none;user-select:none}
.quote-tag{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.56rem;letter-spacing:.5em;color:var(--ember2);text-transform:uppercase;margin-bottom:1.6rem;display:flex;align-items:center;gap:.8rem}
.quote-tag::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.quote-open{font-family:'IM Fell English',serif;font-size:3.2rem;color:var(--ember2);line-height:.5;display:block;margin-bottom:.9rem;opacity:.85}
.quote-body{font-family:'Nanum Myeongjo',serif;font-size:clamp(1rem,2.8vw,1.15rem);font-weight:400;color:#F5F1EA;line-height:2;letter-spacing:.01em;position:relative;z-index:1}
.quote-author{margin-top:1.5rem;display:flex;align-items:center;gap:.9rem}
.quote-author-line{flex:0 0 26px;height:1px;background:var(--ember2);opacity:.6}
.quote-author-name{font-family:'IM Fell English',serif;font-style:italic;font-size:.82rem;color:rgba(245,241,234,.5);letter-spacing:.06em}
.apply-card{margin-top:.9rem;background:var(--ivory2);border-radius:6px;border-left:3px solid var(--ember);padding:1.5rem 1.6rem;animation:cardIn .7s ease .15s both}
.apply-eyebrow{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.56rem;letter-spacing:.5em;color:var(--ember);text-transform:uppercase;margin-bottom:.8rem}
.apply-body{font-family:'Noto Serif KR',serif;font-weight:300;font-size:.9rem;color:var(--ink2);line-height:1.95}
/* BIBLE CARD */
.bible-card{border:1px solid var(--line);border-radius:6px;overflow:hidden;animation:cardIn .7s ease both}
.bible-verse-area{padding:2.2rem 2rem 1.8rem;background:var(--ivory2);position:relative}
.bible-verse-area::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--ember) 0%,var(--dust2) 100%)}
.bible-ref{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.62rem;letter-spacing:.42em;color:var(--ember);text-transform:uppercase;margin-bottom:1.1rem;display:flex;align-items:center;gap:.6rem}
.bible-ref::before{content:'✦';font-size:.48rem}
.bible-verse{font-family:'Nanum Myeongjo',serif;font-size:clamp(.98rem,2.8vw,1.12rem);font-weight:700;color:var(--ink);line-height:2;letter-spacing:.02em}
.bible-meta{border-top:1px solid var(--line)}
.bible-row{padding:1.3rem 2rem;border-bottom:1px solid var(--line2)}
.bible-row:last-child{border-bottom:none}
.bible-row-tag{font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.56rem;letter-spacing:.42em;color:var(--dust);text-transform:uppercase;margin-bottom:.55rem}
.bible-row-body{font-family:'Noto Serif KR',serif;font-weight:300;font-size:.9rem;color:var(--ink2);line-height:1.95}
.bible-row.apply-row .bible-row-tag{color:var(--ember)}
.bible-row.apply-row{background:linear-gradient(135deg,rgba(181,112,74,.04) 0%,transparent 60%)}
/* FOOTER */
.footer{padding:1.8rem 0 .8rem;text-align:center;border-top:1px solid var(--line)}
.footer-text{font-family:'IM Fell English',serif;font-style:italic;font-size:.72rem;color:var(--dust2);letter-spacing:.08em}
.section.quote-sec{animation:fadeIn 1s ease .6s both}
.section.bible-sec{animation:fadeIn 1s ease .9s both}
</style>
</head>
<body>

<button id="settings-btn" onclick="resetKey()">⚙ API 키 변경</button>

<div id="splash">
  <div class="splash-kanji">始</div>
  <div class="splash-sub">Begin · 하루의 시작</div>
  <div class="splash-vline"></div>
  <div class="key-area" id="key-area">
    <input id="api-key-input" class="key-input" type="password"
      placeholder="Gemini API Key 입력"
      onkeydown="if(event.key==='Enter')startApp()"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="key-hint">키는 이 기기에만 저장되며<br>외부로 전송되지 않아요</div>
  </div>
  <div id="key-saved-area" style="display:none">
    <div class="key-saved-msg">✦ 저장된 API 키가 있어요</div>
  </div>
  <button class="splash-btn" onclick="startApp()">하루를 시작하다</button>
  <div id="key-error" class="key-error">API 키를 입력해 주세요</div>
</div>

<div id="app">
  <header class="header">
    <div class="header-label" id="hour-label">아침 — MORNING</div>
    <div class="time-block">
      <div class="time-hm" id="time-hm">00:00</div>
      <div class="time-s"  id="time-s">:00</div>
    </div>
    <div class="date-row">
      <div class="date-ko" id="date-ko"></div>
      <div class="greeting-tag">Begin well</div>
    </div>
  </header>
  <div class="weather-wrap">
    <div id="weather-content">
      <div class="loader"><div class="loader-ring"></div><div class="loader-text">위치 확인 중</div></div>
    </div>
    <div class="divider"></div>
  </div>
  <section class="section quote-sec">
    <div class="section-header">
      <div class="section-label">오늘의 명언</div>
      <button class="refresh-btn" id="quote-refresh" onclick="loadQuote()">새로 받기</button>
    </div>
    <div id="quote-content">
      <div class="loader"><div class="loader-ring"></div><div class="loader-text">불러오는 중</div></div>
    </div>
  </section>
  <div class="divider"></div>
  <section class="section bible-sec">
    <div class="section-header">
      <div class="section-label">오늘의 말씀</div>
      <button class="refresh-btn" id="bible-refresh" onclick="loadBible()">새로 받기</button>
    </div>
    <div id="bible-content">
      <div class="loader"><div class="loader-ring"></div><div class="loader-text">불러오는 중</div></div>
    </div>
  </section>
  <footer class="footer">
    <div class="footer-text">Every morning is a new beginning — 매일 아침은 새로운 시작입니다</div>
  </footer>
</div>

<script>
const DAYS=["일","월","화","수","목","금","토"];
const WX_ICON={0:"☀",1:"🌤",2:"⛅",3:"☁",45:"≋",48:"≋",51:"·",53:"·",61:"⌁",63:"⌁",71:"*",73:"*",80:"⌁",95:"⚡"};
const WX_LABEL={0:"맑음",1:"대체로 맑음",2:"구름 조금",3:"흐림",45:"안개",48:"짙은 안개",51:"가벼운 이슬비",53:"이슬비",61:"가벼운 비",63:"비",71:"눈 조금",73:"눈",80:"소나기",95:"뇌우"};
let USER_API_KEY="";
function fmt2(n){return String(n).padStart(2,"0")}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function loaderHTML(t="불러오는 중"){return`<div class="loader"><div class="loader-ring"></div><div class="loader-text">${t}</div></div>`}
function errMsg(t){return`<p style="font-family:'Noto Sans KR',sans-serif;font-weight:100;font-size:.78rem;letter-spacing:.15em;color:var(--dust);padding:.4rem 0">${t}</p>`}
function getHourLabel(h){
  if(h<5)return{en:"DEEP NIGHT",ko:"깊은 밤"};
  if(h<7)return{en:"DAWN",ko:"새벽"};
  if(h<11)return{en:"MORNING",ko:"아침"};
  if(h<14)return{en:"MIDDAY",ko:"낮"};
  if(h<17)return{en:"AFTERNOON",ko:"오후"};
  if(h<20)return{en:"EVENING",ko:"저녁"};
  return{en:"NIGHT",ko:"밤"};
}
function tickClock(){
  const now=new Date(),h=now.getHours(),hl=getHourLabel(h);
  document.getElementById("hour-label").textContent=`${hl.ko} — ${hl.en}`;
  document.getElementById("time-hm").textContent=`${fmt2(h)}:${fmt2(now.getMinutes())}`;
  document.getElementById("time-s").textContent=`:${fmt2(now.getSeconds())}`;
  document.getElementById("date-ko").textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${DAYS[now.getDay()]}요일`;
}
setInterval(tickClock,1000);tickClock();

window.addEventListener("DOMContentLoaded",()=>{
  const saved=localStorage.getItem("morning_api_key");
  if(saved){
    document.getElementById("key-area").style.display="none";
    document.getElementById("key-saved-area").style.display="block";
  }
});

function startApp(){
  const saved=localStorage.getItem("morning_api_key");
  const typed=document.getElementById("api-key-input").value.trim();
  const key=typed||saved;
  if(!key){
    const err=document.getElementById("key-error");
    err.style.display="block";
    setTimeout(()=>err.style.display="none",2500);
    return;
  }
  if(typed)localStorage.setItem("morning_api_key",typed);
  USER_API_KEY=key;
  const splash=document.getElementById("splash"),app=document.getElementById("app");
  splash.classList.add("out");
  setTimeout(()=>{splash.style.display="none"},1300);
  app.classList.add("visible");
  document.getElementById("settings-btn").style.display="block";
  loadWeather();loadQuote();loadBible();
}
function resetKey(){
  if(!confirm("저장된 API 키를 삭제할까요?"))return;
  localStorage.removeItem("morning_api_key");
  location.reload();
}

let hourlyData=[],hourlyOpen=false;
function loadWeather(){
  if(!navigator.geolocation){document.getElementById("weather-content").innerHTML=errMsg("위치 정보를 사용할 수 없어요");return}
  navigator.geolocation.getCurrentPosition(async({coords})=>{
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${coords.latitude}&longitude=${coords.longitude}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&hourly=temperature_2m,weathercode&timezone=auto&forecast_days=1`;
      const d=await(await fetch(url)).json(),c=d.current,nowH=new Date().getHours();
      hourlyData=d.hourly.time.map((t,i)=>({time:t.slice(11,16),temp:Math.round(d.hourly.temperature_2m[i]),code:d.hourly.weathercode[i],h:+t.slice(11,13)})).filter(x=>x.h>=nowH).slice(0,8);
      document.getElementById("weather-content").innerHTML=`
        <div class="weather-main" onclick="toggleHourly()">
          <div class="weather-left">
            <div class="weather-icon">${WX_ICON[c.weathercode]??"○"}</div>
            <div>
              <div class="weather-temp">${Math.round(c.temperature_2m)}°</div>
              <div class="weather-label">${WX_LABEL[c.weathercode]??"—"}</div>
            </div>
          </div>
          <div class="weather-right">
            <div class="weather-stat">습도 ${c.relativehumidity_2m}%</div>
            <div class="weather-stat">바람 ${Math.round(c.windspeed_10m)} km/h</div>
            <div class="weather-toggle" id="wx-toggle">▼ 시간별 보기</div>
          </div>
        </div>
        <div id="hourly-strip" style="display:none"></div>`;
      const strip=document.getElementById("hourly-strip");
      strip.className="hourly-strip";
      strip.innerHTML=hourlyData.map(h=>`<div class="hour-cell"><div class="hour-time">${h.time}</div><div class="hour-wx">${WX_ICON[h.code]??"○"}</div><div class="hour-temp">${h.temp}°</div></div>`).join("");
    }catch{document.getElementById("weather-content").innerHTML=errMsg("날씨를 불러올 수 없어요")}
  },()=>{document.getElementById("weather-content").innerHTML=errMsg("위치 권한이 필요해요")});
}
function toggleHourly(){
  const strip=document.getElementById("hourly-strip"),toggle=document.getElementById("wx-toggle");
  if(!strip)return;
  hourlyOpen=!hourlyOpen;
  strip.style.display=hourlyOpen?"flex":"none";
  toggle.textContent=hourlyOpen?"▲ 접기":"▼ 시간별 보기";
}

async function callAI(prompt){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${USER_API_KEY}`;
  
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  });
  
  const d = await r.json();
  
  if(d.error) throw new Error("오류: " + (d.error.message || "알 수 없는 오류"));
  if(!d.candidates || d.candidates.length === 0) throw new Error("응답 없음 (status " + r.status + ")");
  
  return d.candidates[0].content.parts[0].text;
}

function parseQuote(raw){
  const lines=raw.split("\n").map(l=>l.trim()).filter(Boolean);
  let text="",source="",applyLines=[],inApply=false;
  for(const l of lines){
    if(l.startsWith("💡")||l.includes("삶의 적용")||l.includes("적용:")){inApply=true;continue}
    if(!inApply){
      const m=l.match(/[""](.+)[""]/)||l.match(/[「'](.+)[」']/);
      if(m){text=m[1];continue}
      const sm=l.match(/[—–-]\s*(.+)$/);
      if(sm&&text){source=sm[1];continue}
      if(!text&&l.length>4)text=l;
    }else{applyLines.push(l.replace(/^[💡✨🌿🙏•\-*]+\s*/,""))}
  }
  return{text:text||raw,source,apply:applyLines.join(" ")};
}

function parseBible(raw){
  const lines=raw.split("\n").map(l=>l.trim()).filter(Boolean);
  let ref="",verse="",interpret="",applyLines=[],mode="";
  for(const l of lines){
    if(l.includes("해석:")||l.startsWith("✨")){mode="interpret";continue}
    if(l.includes("적용:")||l.startsWith("🙏")){mode="apply";continue}
    if(l.startsWith("📖")||l.match(/^[가-힣]+\s*\d+:\d+/)){ref=l.replace("📖","").trim();continue}
    if(!mode){
      const m=l.match(/[""](.+)[""]/)||l.match(/[「"](.+)[」"]/);
      if(m){verse=m[1];continue}
      if(!verse&&l.length>6)verse=l;
    }else if(mode==="interpret"){interpret+=l+" "}
    else if(mode==="apply"){applyLines.push(l.replace(/^[🙏💡✨•\-*]+\s*/,""))}
  }
  return{ref,verse:verse||raw,interpret:interpret.trim(),apply:applyLines.join(" ")};
}

/* Service Worker — 앱 캐싱 */
if("serviceWorker" in navigator){
  const sw=`
    const C="morning-v1";
    self.addEventListener("install",e=>{self.skipWaiting()});
    self.addEventListener("activate",e=>{e.waitUntil(self.clients.claim())});
    self.addEventListener("fetch",e=>{
      if(e.request.url.includes("googleapis.com")||e.request.url.includes("api.open-meteo.com")||e.request.url.includes("fonts.googleapis.com"))return;
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
        const cl=res.clone();
        caches.open(C).then(c=>c.put(e.request,cl));
        return res;
      }).catch(()=>caches.match(e.request))));
    });
  `;
  const blob=new Blob([sw],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
